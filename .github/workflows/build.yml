name: Build
on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Dashboard code
              uses: actions/checkout@v4 # 升级到 v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v3 # 升级到 v3
              with:
                  version: latest

            - name: Setup Nodejs
              uses: actions/setup-node@v4 # 升级到 v4
              with:
                  node-version: '18.x'
                  cache: 'pnpm'

            - name: Install package and build
              run: |
                  pnpm install --no-frozen-lockfile
                  pnpm build

            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dashboard-build-artifact
                  path: public/
                  retention-days: 90